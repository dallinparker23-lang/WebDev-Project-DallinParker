<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #00d4aa;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    #scoreboard span {
      color: #aaa;
    }

    #scoreboard strong {
      color: #fff;
      font-size: 1.3rem;
    }

    #game-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 3px solid #00d4aa;
      border-radius: 6px;
      box-shadow: 0 0 30px rgba(0, 212, 170, 0.3);
      background: #0f0f23;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 35, 0.88);
      border-radius: 4px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #00d4aa;
      letter-spacing: 2px;
    }

    #overlay p {
      color: #bbb;
      font-size: 0.95rem;
    }

    #overlay .final-score {
      font-size: 1.4rem;
      color: #fff;
    }

    button {
      margin-top: 8px;
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #00d4aa;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #00ffcc;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.97);
    }

    #controls {
      margin-top: 18px;
      font-size: 0.82rem;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <h1>Snake</h1>

  <div id="scoreboard">
    <div>Score: <strong id="score">0</strong></div>
    <div>Best: <strong id="best">0</strong></div>
    <div>Level: <strong id="level">1</strong></div>
  </div>

  <div id="game-wrapper">
    <canvas id="canvas" width="500" height="500"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-sub">Use arrow keys or WASD to move</p>
      <div class="final-score" id="overlay-score" style="display:none"></div>
      <button id="btn">Start Game</button>
    </div>
  </div>

  <div id="controls">
    Arrow Keys / WASD &nbsp;|&nbsp; P to Pause
  </div>

  <a href="HomePage.html" style="margin-top: 20px; padding: 10px 28px; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: transparent; color: #00d4aa; border: 2px solid #00d4aa; border-radius: 4px; text-decoration: none; transition: background 0.2s, color 0.2s;" onmouseover="this.style.background='#00d4aa';this.style.color='#1a1a2e'" onmouseout="this.style.background='transparent';this.style.color='#00d4aa'">Home</a>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    const BASE_SPEED = 120;  // ms per tick at level 1
    const MIN_SPEED  = 50;

    let snake, dir, nextDir, food, bonus, score, best, level, gameLoop, paused, running;

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    document.getElementById('best').textContent = best;

    // ── Utilities ──────────────────────────────────────────────────

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randCell(exclude = []) {
      let pos;
      do {
        pos = { x: rand(0, COLS - 1), y: rand(0, ROWS - 1) };
      } while (exclude.some(e => e.x === pos.x && e.y === pos.y));
      return pos;
    }

    function speedForLevel(lvl) {
      return Math.max(MIN_SPEED, BASE_SPEED - (lvl - 1) * 10);
    }

    // ── Init ───────────────────────────────────────────────────────

    function init() {
      snake = [
        { x: 10, y: 12 },
        { x: 9,  y: 12 },
        { x: 8,  y: 12 },
      ];
      dir      = { x: 1, y: 0 };
      nextDir  = { x: 1, y: 0 };
      score    = 0;
      level    = 1;
      paused   = false;
      bonus    = null;
      placeFood();
      updateHUD();
    }

    function placeFood() {
      food = randCell(snake);
    }

    function spawnBonus() {
      if (!bonus) {
        bonus = { ...randCell([...snake, food]), ttl: 80 };
      }
    }

    // ── Game tick ──────────────────────────────────────────────────

    function tick() {
      dir = { ...nextDir };

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      let ate = false;

      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        ate = true;
        placeFood();
        if (score % 50 === 0) spawnBonus();
        const newLevel = Math.floor(score / 100) + 1;
        if (newLevel !== level) {
          level = newLevel;
          restartLoop();
        }
      } else {
        snake.pop();
      }

      if (bonus) {
        if (head.x === bonus.x && head.y === bonus.y) {
          score += 50 * level;
          ate = true;
          bonus = null;
        } else {
          bonus.ttl--;
          if (bonus.ttl <= 0) bonus = null;
        }
      }

      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest', best);
      }

      updateHUD();
      draw();
    }

    // ── Drawing ────────────────────────────────────────────────────

    function draw() {
      // Background
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Snake body
      snake.forEach((seg, i) => {
        const ratio = i / snake.length;
        const g = Math.floor(212 - ratio * 80);
        ctx.fillStyle = i === 0 ? '#00ffcc' : `rgb(0, ${g}, 150)`;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, i === 0 ? 6 : 3);
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          ctx.fillStyle = '#1a1a2e';
          const ex = dir.y !== 0 ? 5 : (dir.x > 0 ? 12 : 5);
          const ey = dir.x !== 0 ? 5 : (dir.y > 0 ? 12 : 5);
          const ex2 = dir.y !== 0 ? 13 : ex;
          const ey2 = dir.x !== 0 ? 13 : ey;
          ctx.beginPath(); ctx.arc(seg.x * CELL + ex,  seg.y * CELL + ey,  2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(seg.x * CELL + ex2, seg.y * CELL + ey2, 2.5, 0, Math.PI * 2); ctx.fill();
        }
      });

      // Food
      drawFood(food.x, food.y, '#ff4757', true);

      // Bonus food
      if (bonus) {
        const alpha = bonus.ttl > 20 ? 1 : bonus.ttl / 20;
        ctx.globalAlpha = alpha;
        drawFood(bonus.x, bonus.y, '#ffd700', false);
        ctx.globalAlpha = 1;
      }
    }

    function drawFood(x, y, color, pulse) {
      const cx = x * CELL + CELL / 2;
      const cy = y * CELL + CELL / 2;
      const r  = pulse ? CELL / 2 - 3 + Math.sin(Date.now() / 200) * 1.5 : CELL / 2 - 3;

      const grad = ctx.createRadialGradient(cx - 2, cy - 2, 1, cx, cy, r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(1, color);

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPause() {
      ctx.fillStyle = 'rgba(15,15,35,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00d4aa';
      ctx.font = 'bold 2rem Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.font = '0.9rem Segoe UI, sans-serif';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 36);
      ctx.textAlign = 'left';
    }

    // ── HUD ────────────────────────────────────────────────────────

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent  = best;
      document.getElementById('level').textContent = level;
    }

    // ── Loop control ───────────────────────────────────────────────

    function startLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speedForLevel(level));
    }

    function restartLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speedForLevel(level));
    }

    function stopLoop() {
      clearInterval(gameLoop);
    }

    // ── Start / End ────────────────────────────────────────────────

    function startGame() {
      document.getElementById('overlay').style.display = 'none';
      init();
      running = true;
      startLoop();
      requestAnimationFrame(animFrame);
    }

    function endGame() {
      stopLoop();
      running = false;
      const overlay     = document.getElementById('overlay');
      const title       = document.getElementById('overlay-title');
      const sub         = document.getElementById('overlay-sub');
      const scoreEl     = document.getElementById('overlay-score');
      const btn         = document.getElementById('btn');

      title.textContent   = 'Game Over';
      sub.textContent     = 'Better luck next time!';
      scoreEl.textContent = `Score: ${score}  |  Best: ${best}`;
      scoreEl.style.display = 'block';
      btn.textContent     = 'Play Again';
      overlay.style.display = 'flex';
    }

    // ── Animation frame (food pulse) ───────────────────────────────

    function animFrame() {
      if (!running) return;
      if (!paused) draw();
      requestAnimationFrame(animFrame);
    }

    // ── Input ──────────────────────────────────────────────────────

    const KEY_DIR = {
      ArrowUp:    { x:  0, y: -1 }, w: { x:  0, y: -1 },
      ArrowDown:  { x:  0, y:  1 }, s: { x:  0, y:  1 },
      ArrowLeft:  { x: -1, y:  0 }, a: { x: -1, y:  0 },
      ArrowRight: { x:  1, y:  0 }, d: { x:  1, y:  0 },
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'p' || e.key === 'P') {
        if (!running) return;
        paused = !paused;
        if (paused) { stopLoop(); drawPause(); }
        else        { startLoop(); }
        return;
      }
      const newDir = KEY_DIR[e.key];
      if (!newDir) return;
      e.preventDefault();
      // Prevent reversing
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;
      nextDir = newDir;
    });

    document.getElementById('btn').addEventListener('click', startGame);

    // Draw initial empty board
    (function initialDraw() {
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    })();
  </script>

</body>
</html>
