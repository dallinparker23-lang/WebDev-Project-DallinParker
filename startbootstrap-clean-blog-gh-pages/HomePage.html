<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin Parker</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f1117;
            color: #e8eaf0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f8ef7, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 1.5rem;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1rem;
            color: #8b90a0;
            margin-bottom: 3rem;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #4f8ef7, #8b5cf6);
            margin: 0 auto 3rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.15s, background 0.2s;
        }

        .card:hover {
            border-color: #4f8ef7;
            background: #1e2133;
            transform: translateY(-2px);
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .icon-blue  { background: rgba(79, 142, 247, 0.15); }
        .icon-green { background: rgba(52, 211, 153, 0.15); }
        .icon-purple{ background: rgba(139, 92, 246, 0.15); }

        .card-text {
            text-align: left;
            flex: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.2rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #8b90a0;
        }

        .card-arrow {
            font-size: 1.1rem;
            color: #3a3f52;
            transition: color 0.2s, transform 0.15s;
        }

        .card:hover .card-arrow {
            color: #4f8ef7;
            transform: translateX(3px);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #3a3f52;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">DP</div>
        <h1>Dallin Parker</h1>
        <p class="tagline">Developer &amp; Builder</p>
        <div class="divider"></div>

        <div class="cards">
            <a href="Resume.html" class="card">
                <div class="card-icon icon-blue">&#128196;</div>
                <div class="card-text">
                    <div class="card-title">Resume</div>
                    <div class="card-desc">Education, experience, and skills</div>
                </div>
                <span class="card-arrow">&#8594;</span>
            </a>


            <a href="fromScratch.html" class="card">
                <div class="card-icon icon-purple">&#127936;</div>
                <div class="card-text">
                    <div class="card-title">From-Scratch: March Madness</div>
                    <div class="card-desc">A project built from the ground up</div>
                </div>
                <span class="card-arrow">&#8594;</span>
            </a>

            <a href="snakegame.html" class="card">
                <div class="card-icon icon-green">&#127822;</div>
                <div class="card-text">
                    <div class="card-title">Snake Game</div>
                    <div class="card-desc">Classic arcade game built in the browser</div>
                </div>
                <span class="card-arrow">&#8594;</span>
            </a>
        </div>

        <footer>dallinparker.com</footer>
    </div>
</body>
</html>
